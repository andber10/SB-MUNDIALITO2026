<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundialito 2026 — Pronostici</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f5;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn.small{padding:5px 10px;font-size:12px}
.player-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.player-btn{display:flex;flex-direction:column;align-items:center;padding:20px 10px;border:1px solid #e0e0e0;border-radius:12px;cursor:pointer;transition:all .15s;background:#fff;gap:8px}
.player-btn:hover{border-color:#185FA5;background:#f0f6ff}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-size:18px}
.phase-header{background:#185FA5;color:#fff;padding:8px 12px;border-radius:8px;font-weight:600;font-size:13px;margin:16px 0 8px}
.match-row{display:grid;grid-template-columns:56px 1fr 100px 44px;gap:8px;align-items:center;padding:8px 10px;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:5px;background:#fff}
.pron-input{width:80px;padding:5px 6px;border:1px solid #ccc;border-radius:6px;font-size:13px;text-align:center;background:#fffde7;font-family:monospace}
.pron-input:focus{outline:2px solid #185FA5;border-color:#185FA5}
.pron-input.locked{background:#e8f5e9;border-color:#4caf50;color:#1b5e20;cursor:not-allowed;font-weight:600}
.save-row-btn{padding:4px 8px;font-size:11px;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;white-space:nowrap}
.save-row-btn:hover{background:#0C447C}
.pts-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;min-width:34px}
.pts-8{background:#2e7d32;color:#fff}
.pts-3{background:#c8e6c9;color:#1b5e20}
.pts-0{background:#ffcdd2;color:#b71c1c}
.pts-empty{background:#f0f0f0;color:#999}
.result-input{width:80px;padding:5px 6px;border:1px solid #ccc;border-radius:6px;font-size:13px;text-align:center;background:#e8f5e9;color:#1b5e20;font-weight:600;font-family:monospace}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid #e0e0e0}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tab.active{color:#185FA5;border-bottom-color:#185FA5}
.g-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;color:#fff;font-weight:600}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e8e8e8}
table.mt{width:100%;border-collapse:collapse;font-size:12px}
table.mt th{padding:6px 8px;border-bottom:1px solid #e0e0e0;color:#666;font-weight:600;font-size:11px;text-align:center;white-space:nowrap}
table.mt td{padding:5px 6px;border-bottom:1px solid #f0f0f0;text-align:center;vertical-align:middle}
.rank-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:8px;border:1px solid #e0e0e0;background:#fff}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:340px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.field input{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px}
.field input:focus{outline:2px solid #185FA5}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2e7d32;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}
.screen{display:none}
.screen.active{display:block}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#185FA5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hint{font-size:11px;color:#888;margin-top:10px;padding:8px 10px;background:#f9f9f9;border-radius:6px;border-left:3px solid #185FA5}
@media(max-width:480px){.match-row{grid-template-columns:44px 1fr 80px 36px}.pron-input,.result-input{width:70px}}
</style>
</head>
<body>
<div class="container">

<div id="loading-screen" style="text-align:center;padding:60px 20px">
  <div style="font-size:28px;margin-bottom:8px">⚽</div>
  <div style="font-size:18px;font-weight:600;margin-bottom:4px">Mundialito 2026</div>
  <div style="color:#666;margin-bottom:20px">Caricamento...</div>
  <div class="spinner"></div>
</div>

<div id="screen-login" class="screen">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:28px;margin-bottom:6px">⚽</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">Mundialito 2026</div>
    <div style="font-size:13px;color:#666">Scegli il tuo profilo</div>
  </div>
  <div class="player-grid" id="player-grid"></div>
  <div class="card" style="text-align:center">
    <button class="btn primary" onclick="loginAdmin()" style="font-size:14px;padding:10px 24px">⚙️ Accesso admin</button>
  </div>
</div>

<div id="screen-player" class="screen">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div id="player-avatar" class="avatar" style="width:36px;height:36px;font-size:14px"></div>
      <div>
        <div id="player-title" style="font-weight:600;font-size:15px"></div>
        <div id="player-subtitle" style="font-size:11px;color:#666"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn small" onclick="openChangePwd()">🔑</button>
      <button class="btn small" onclick="goTo('login')">← Esci</button>
    </div>
  </div>
  <div class="hint">📝 Scrivi il pronostico in formato <b>X-Y</b> (es. 2-1 · 0-0 · 1-3) e clicca <b>Salva</b> sulla riga. Una volta salvata la singola partita non puoi più cambiarla.</div>
  <div id="player-matches" style="margin-top:12px"></div>
</div>

<div id="screen-admin" class="screen">
  <div class="topbar">
    <div style="font-size:16px;font-weight:700">⚙️ Admin — Mundialito 2026</div>
    <button class="btn small" onclick="goTo('login')">← Esci</button>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('risultati',this)">Risultati</div>
    <div class="tab" onclick="switchTab('master',this)">Master</div>
    <div class="tab" onclick="switchTab('classifica',this)">Classifica</div>
  </div>
  <div id="tab-risultati"></div>
  <div id="tab-master" style="display:none"></div>
  <div id="tab-classifica" style="display:none"></div>
</div>

</div>

<div id="modal-pwd" class="modal-bg">
  <div class="modal">
    <div style="font-weight:600;font-size:16px;margin-bottom:16px">🔑 Cambia password</div>
    <div class="field"><label>Password attuale</label><input type="password" id="pwd-old" placeholder="Password attuale"></div>
    <div class="field"><label>Nuova password</label><input type="password" id="pwd-new1" placeholder="Nuova password (min. 6 caratteri)"></div>
    <div class="field"><label>Conferma nuova password</label><input type="password" id="pwd-new2" placeholder="Ripeti la nuova password"></div>
    <div id="pwd-error" style="color:#b71c1c;font-size:12px;margin-bottom:10px;display:none"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">Annulla</button>
      <button class="btn primary" onclick="confirmChangePwd()">Salva</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

let state={results:{},forecasts:{},locked:{},pwds:{},teams:{}};
let currentPlayer=null;

function getPwd(id){return state.pwds[id]||DEFAULT_PWDS[id]||"";}

async function loadState(){
  try{const snap=await get(ref(db,"state"));if(snap.exists())state=Object.assign({results:{},forecasts:{},locked:{},pwds:{},teams:{}},snap.val());}
  catch(e){console.error(e);}
}
async function saveState(){
  try{await set(ref(db,"state"),state);}catch(e){console.error(e);}
}
function onStateChange(cb){
  onValue(ref(db,"state"),snap=>{
    if(snap.exists()){state=Object.assign({results:{},forecasts:{},locked:{},pwds:{},teams:{}},snap.val());cb();}
  });
}

function toast(msg,color="#2e7d32"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.background=color;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}
function goTo(s){
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
  const el=document.getElementById("screen-"+s);if(el)el.classList.add("active");
}
function switchTab(name,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));el.classList.add("active");
  ["risultati","master","classifica"].forEach(t=>{document.getElementById("tab-"+t).style.display=t===name?"":"none";});
}
function calcPts(f,r){
  if(!f||!r)return null;
  const fu=f.trim().toUpperCase(),ru=r.trim().toUpperCase();
  if(fu===ru)return 8;
  const p=s=>{const m=s.match(/^(\d+)-(\d+)/);return m?[+m[1],+m[2]]:null;};
  const fp=p(fu),rp=p(ru);if(!fp||!rp)return 0;
  const sgn=x=>x>0?1:x<0?-1:0;
  return sgn(fp[0]-fp[1])===sgn(rp[0]-rp[1])?3:0;
}
function gBadge(g){
  const labels={"16":"16°","8":"8°","QF":"QF","SF":"SF","3P":"3°","FIN":"F"};
  const color=GIRONE_COLORS[g]||"#185FA5";
  const label=GIRONI.includes(g)?"Gr."+g:(labels[g]||g);
  return `<span class="g-badge" style="background:${color}">${label}</span>`;
}

function buildPlayerLogin(){
  const grid=document.getElementById("player-grid");grid.innerHTML="";
  PLAYERS_DEF.forEach(p=>{
    const fc=state.forecasts[p.id]||{};
    const count=Object.keys(fc).length;
    const btn=document.createElement("div");btn.className="player-btn";
    btn.innerHTML=`<div class="avatar" style="background:${p.color}">${p.initials}</div><div style="font-weight:600;font-size:14px">${p.name}</div><div style="font-size:11px;color:#888">${count>0?count+" salvati":"Nessuno ancora"}</div>`;
    btn.onclick=()=>selectPlayer(p);
    grid.appendChild(btn);
  });
}

function selectPlayer(p){
  const pwd=prompt(`Password per ${p.name}:`);
  if(!pwd||pwd!==getPwd(p.id)){alert("Password errata");return;}
  currentPlayer=p;
  document.getElementById("player-avatar").style.background=p.color;
  document.getElementById("player-avatar").textContent=p.initials;
  document.getElementById("player-title").textContent=p.name;
  const count=Object.keys(state.forecasts[p.id]||{}).length;
  document.getElementById("player-subtitle").textContent=count>0?`${count} pronostici salvati`:"Nessun pronostico ancora";
  renderPlayerMatches();
  goTo("player");
}

function renderPlayerMatches(){
  const container=document.getElementById("player-matches");container.innerHTML="";
  const p=currentPlayer;
  const forecasts=state.forecasts[p.id]||{};
  const results=state.results||{};
  const teams=state.teams||{};
  let curPhase=null;

    const pk=GIRONI.includes(m.g)?"A":m.g;
    if(pk!==curPhase){
      curPhase=pk;
      const ph=document.createElement("div");ph.className="phase-header";
      ph.textContent=PHASE_LABELS[pk]||pk;container.appendChild(ph);
    }

    const fc=forecasts[m.id]||"";
    const res=results[m.id]||"";
    const pts=res&&fc?calcPts(fc,res):null;
    const isLocked=!!fc; // locked solo se questa specifica partita è già salvata
    const sqA=m.a||teams[m.id+"_a"]||"";
    const sqB=m.b||teams[m.id+"_b"]||"";
    const teamsLabel=sqA&&sqB
      ?`${sqA} <span style="color:#999;font-weight:400">vs</span> ${sqB}`
      :`<span style="color:#aaa;font-style:italic">Partita ${m.id}</span>`;

    let ptsBadge=`<span class="pts-badge pts-empty">—</span>`;
    if(pts===8)ptsBadge=`<span class="pts-badge pts-8">+8</span>`;
    else if(pts===3)ptsBadge=`<span class="pts-badge pts-3">+3</span>`;
    else if(pts===0&&res&&fc)ptsBadge=`<span class="pts-badge pts-0">0</span>`;

    // Terza colonna: se bloccata mostra il pronostico; altrimenti input + pulsante salva
    let inputCell;
    if(isLocked){
      inputCell=`<input type="text" class="pron-input locked" value="${fc}" readonly>`;
    } else {
      inputCell=`<div style="display:flex;flex-direction:column;gap:4px;align-items:center">
        <input type="text" maxlength="7" placeholder="X-Y" class="pron-input" data-id="${m.id}" style="font-family:monospace">
        <button class="save-row-btn" data-id="${m.id}">Salva</button>
      </div>`;
    }

    const row=document.createElement("div");row.className="match-row";
    row.innerHTML=`
      <div style="text-align:center">${gBadge(m.g)}<div style="font-size:10px;color:#999;margin-top:2px">${m.d}</div></div>
      <div style="font-size:13px;font-weight:500">${teamsLabel}</div>
      ${inputCell}
      <div>${ptsBadge}</div>`;
    container.appendChild(row);
  });

  // Attach save handlers
  container.querySelectorAll(".save-row-btn").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const mid=btn.dataset.id;
      const inp=container.querySelector(`.pron-input[data-id="${mid}"]`);
      const val=(inp?.value||"").trim();
      if(!val){toast("Inserisci un pronostico prima di salvare","#b71c1c");inp?.focus();return;}
      // Validate format X-Y
      if(!/^\d+-\d+$/.test(val)){toast("Formato non valido — usa X-Y (es. 2-1)","#b71c1c");inp?.focus();return;}
      if(!confirm(`Salvare il pronostico "${val}" per questa partita? Non potrai più cambiarlo.`))return;
      if(!state.forecasts[p.id])state.forecasts[p.id]={};
      state.forecasts[p.id][mid]=val;
      await saveState();
      toast("Pronostico salvato e bloccato ✓");
      // Update subtitle
      const count=Object.keys(state.forecasts[p.id]).length;
      document.getElementById("player-subtitle").textContent=`${count} pronostici salvati`;
      renderPlayerMatches();
    });
  });
}

function openChangePwd(){
  document.getElementById("pwd-old").value="";
  document.getElementById("pwd-new1").value="";
  document.getElementById("pwd-new2").value="";
  document.getElementById("pwd-error").style.display="none";
  document.getElementById("modal-pwd").classList.add("open");
}
function closeModal(){document.getElementById("modal-pwd").classList.remove("open");}
window.closeModal=closeModal;

async function confirmChangePwd(){
  const p=currentPlayer;
  const oldPwd=document.getElementById("pwd-old").value;
  const new1=document.getElementById("pwd-new1").value;
  const new2=document.getElementById("pwd-new2").value;
  const errEl=document.getElementById("pwd-error");errEl.style.display="none";
  if(oldPwd!==getPwd(p.id)){errEl.textContent="Password attuale errata";errEl.style.display="block";return;}
  if(new1.length<6){errEl.textContent="Minimo 6 caratteri";errEl.style.display="block";return;}
  if(new1!==new2){errEl.textContent="Le due password non coincidono";errEl.style.display="block";return;}
  if(!state.pwds)state.pwds={};
  state.pwds[p.id]=new1;
  await saveState();closeModal();toast("Password aggiornata!");
}
window.confirmChangePwd=confirmChangePwd;

function renderRisultati(){
  const div=document.getElementById("tab-risultati");
  div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:12px;color:#666">Inserisci i risultati reali dopo ogni partita. Si salvano automaticamente.</div>
    <button class="btn small" onclick="openChangePwdAdmin()">🔑 Pwd admin</button>
  </div>`;
  let curPhase=null;
  MATCHES.forEach(m=>{
    const pk=GIRONI.includes(m.g)?"A":m.g;
    if(pk!==curPhase){
      curPhase=pk;
      const ph=document.createElement("div");ph.className="phase-header";ph.textContent=PHASE_LABELS[pk]||pk;div.appendChild(ph);
    }
    const res=(state.results[m.id])||"";
    const teams=state.teams||{};
    const sqA=m.a||teams[m.id+"_a"]||"";
    const sqB=m.b||teams[m.id+"_b"]||"";
    const teamsLabel=sqA&&sqB?`${sqA} <span style="color:#999;font-weight:400">vs</span> ${sqB}`:`Partita ${m.id}`;
    const row=document.createElement("div");row.className="match-row";
    const hasTeams=!m.a;
    row.innerHTML=`
      <div style="text-align:center">${gBadge(m.g)}<div style="font-size:10px;color:#999;margin-top:2px">${m.d}</div></div>
      <div>
        <div style="font-size:13px;font-weight:500">${teamsLabel}</div>
        ${hasTeams?`<div style="display:flex;gap:4px;margin-top:4px">
          <input type="text" placeholder="Squadra A" value="${sqA}" data-team="${m.id}_a" style="width:100px;padding:3px 6px;border:1px solid #ccc;border-radius:6px;font-size:11px">
          <input type="text" placeholder="Squadra B" value="${sqB}" data-team="${m.id}_b" style="width:100px;padding:3px 6px;border:1px solid #ccc;border-radius:6px;font-size:11px">
        </div>`:""}
      </div>
      <input type="text" maxlength="7" placeholder="X-Y" class="result-input" value="${res}" data-id="${m.id}" style="font-family:monospace">
      <div style="font-size:14px;color:#2e7d32">${res?"✓":""}</div>`;
    div.appendChild(row);
  });
  div.querySelectorAll(".result-input").forEach(inp=>{
    inp.addEventListener("change",async()=>{
      if(!state.results)state.results={};
      state.results[inp.dataset.id]=inp.value.trim();
      await saveState();toast("Risultato salvato");
      renderMaster();renderClassifica();
    });
  });
  div.querySelectorAll("[data-team]").forEach(inp=>{
    inp.addEventListener("change",async()=>{
      if(!state.teams)state.teams={};
      state.teams[inp.dataset.team]=inp.value.trim();
      await saveState();toast("Squadra salvata");renderMaster();
    });
  });
}

function renderMaster(){
  const div=document.getElementById("tab-master");div.innerHTML="";
  const tbl=document.createElement("table");tbl.className="mt";
  const hr=tbl.createTHead().insertRow();
  ["","Data","Partita","Risultato","Gioacchino","Pts","Andrea","Pts","Giuliano","Pts"].forEach(h=>{
    const th=document.createElement("th");th.textContent=h;hr.appendChild(th);
  });
  const tbody=tbl.createTBody();let curPhase=null;
  MATCHES.forEach(m=>{
    const pk=GIRONI.includes(m.g)?"A":m.g;
    if(pk!==curPhase){
      curPhase=pk;
      const pr=tbody.insertRow();const pc=pr.insertCell();
      pc.colSpan=10;pc.textContent=PHASE_LABELS[pk]||pk;
      pc.style.cssText="background:#185FA5;color:#fff;padding:6px 10px;font-weight:600";
    }
    const res=state.results[m.id]||"";
    const teams=state.teams||{};
    const sqA=m.a||teams[m.id+"_a"]||"";
    const sqB=m.b||teams[m.id+"_b"]||"";
    const teamsLabel=sqA&&sqB?`${sqA} vs ${sqB}`:`Partita ${m.id}`;
    const row=tbody.insertRow();
    const cells=[
      `<span style="font-size:10px;color:#999">${m.id}</span>`,m.d,
      `<span style="font-weight:600;font-size:12px">${teamsLabel}</span>`,
      res?`<span style="background:#e8f5e9;color:#1b5e20;padding:2px 8px;border-radius:6px;font-weight:600">${res}</span>`:`<span style="color:#ccc">—</span>`,
    ];
    PLAYERS_DEF.forEach(p=>{
      const fc=state.forecasts[p.id]&&state.forecasts[p.id][m.id];
      const pts=res&&fc?calcPts(fc,res):null;
      cells.push(
        res
          ? (fc ? `<span style="background:#fff9c4;color:#7d6608;padding:2px 8px;border-radius:6px;font-weight:600">${fc}</span>` : `<span style="color:#ccc">—</span>`)
          : (fc ? `<span style="background:#e0e0e0;color:#e0e0e0;padding:2px 8px;border-radius:6px;font-size:11px;user-select:none" title="Visibile dopo il risultato">●●●</span>` : `<span style="color:#ccc">—</span>`)
      );
      if(pts===8)cells.push(`<span class="pts-badge pts-8">+8</span>`);
      else if(pts===3)cells.push(`<span class="pts-badge pts-3">+3</span>`);
      else if(pts===0&&res&&fc)cells.push(`<span class="pts-badge pts-0">0</span>`);
      else cells.push(`<span style="color:#ccc">—</span>`);
    });
    cells.forEach((html,i)=>{
      const td=row.insertCell();td.innerHTML=html;
      td.style.padding="5px 6px";td.style.textAlign=i===2?"left":"center";td.style.verticalAlign="middle";
    });
  });
  div.appendChild(tbl);
}

function renderClassifica(){
  const div=document.getElementById("tab-classifica");div.innerHTML="";
  const scores=PLAYERS_DEF.map(p=>{
    let pts=0,esatti=0,esito=0,giocate=0;
    MATCHES.forEach(m=>{
      const fc=state.forecasts[p.id]&&state.forecasts[p.id][m.id];
      const res=state.results[m.id];
      if(fc)giocate++;
      if(fc&&res){const s=calcPts(fc,res);pts+=s;if(s===8)esatti++;else if(s===3)esito++;}
    });
    return{p,pts,esatti,esito,giocate};
  }).sort((a,b)=>b.pts-a.pts||b.esatti-a.esatti||b.esito-a.esito);
  const medals=["🥇","🥈","🥉"],bgs=["#fffde7","#f9f9f9","#fdfdfd"];
  scores.forEach((s,i)=>{
    const row=document.createElement("div");row.className="rank-row";row.style.background=bgs[i];
    row.innerHTML=`
      <div style="font-size:24px;width:36px;text-align:center">${medals[i]}</div>
      <div class="avatar" style="width:36px;height:36px;font-size:14px;background:${s.p.color}">${s.p.initials}</div>
      <div style="font-weight:600;font-size:15px;flex:1">${s.p.name}</div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:700;color:#185FA5">${s.pts} pt</div>
        <div style="font-size:11px;color:#888">${s.esatti} esatti · ${s.esito} esito · ${s.giocate} giocate</div>
      </div>`;
    div.appendChild(row);
  });
}
